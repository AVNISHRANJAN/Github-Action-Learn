# Workflow name (shown in GitHub Actions tab)
name: portfolio

# Trigger workflow when code is pushed to the main branch
on:
  push:
    branches: [main]

  workflow_dispatch:

# Required permissions for GitHub Pages deployment
permissions:
  pages: write
  id-token: write

# Job definition
jobs:
  deploy:
    runs-on: ubuntu-latest

    # GitHub Pages environment configuration
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:

      # Step 1: Checkout repository code
      # This downloads your repo code into the runner
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Configure GitHub Pages environment
      # Prepares the runner for deploying a GitHub Pages site
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      # Step 3: Upload website files as an artifact
      # This uploads your static site files to be used by GitHub Pages
      - name: Upload static site files
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."  # folder containing your website files

    # Step 4: Deploy uploaded artifact to GitHub Pages
    # Publishes your site so it becomes accessible online
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4