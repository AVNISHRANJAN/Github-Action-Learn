# This is workflow name
name: Hello Workflow

#runs on trigger
on:
  push:
    branches: [main]

# Jobs section
jobs:
  # Job name
  greet:
    runs-on: ubuntu-latest

    steps:
      - name: Say hello to users
        run: echo "Hello Dosto"

      - name: Say hello to username
        run: echo "Hello $USER"
