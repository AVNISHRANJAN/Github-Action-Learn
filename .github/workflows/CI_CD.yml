# This is the name of the workflow (shown in Actions tab)
name: CICD

# Manual trigger
on:
  workflow_dispatch:
    inputs:
      environments:
         description: this is the enveronment where this workflow runs 
         default: 'dev' 
         required: true
         type: choice
         options:
           - dev
           - prod
           - staging
jobs:

  code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Code cloned
        run: echo "Code cloned from GitHub"

  build:
    runs-on: ubuntu-latest
    needs: code
    steps:
      - name: Build Docker Container
        run: echo "Docker container build"

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Test the container
        run: echo "Testing the container"

  deploy:
    needs: [build,test]
    runs-on: ubuntu-latest
   
    steps:
      - name: Deploy the app
        run: echo "Docker compose deploy"
