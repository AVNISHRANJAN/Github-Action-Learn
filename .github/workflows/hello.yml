name: Hello Workflow

on:
  push:
    branches: [main]

jobs:
  greet:
    runs-on: ubuntu-latest

    steps:
      - name: Say hello to users
        run: echo "Hello Dosto"

      - name: Say hello to username
        run: echo "Hello $USER"

  details:
    runs-on: ubuntu-latest

    steps:
      - name: Show versions of Docker and Python
        run: |
          docker --version
          python3 --version
